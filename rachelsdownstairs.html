<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Only Page</title>
    <style>
        /* Remove default browser gaps and hide scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Dark background fallback */
        }

        /* Make the image scale nicely across the viewport */
        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps image proportions without stretching or cropping */
        }
    </style>
</head>
<body>

    <!-- Replace 'your-image.jpg' with your actual image file name or URL -->
    <img src="images\Hotel Add-On Packages & Fees Menu.PNG" alt="Service Menu">

</body>
</html>
